<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
    <!-- Header with improved typography -->
    <div class="flex justify-between items-center mb-5">
        <div class="flex items-center gap-2">
            <div class="w-1 h-6 bg-blue-500 rounded-full"></div>
            <h3 class="text-base font-semibold text-gray-800 tracking-tight">Filter Vehicles</h3>
        </div>
        <button (click)="clearFilters()"
            class="text-xs font-medium text-gray-400 hover:text-blue-500 transition-colors duration-200 px-3 py-1.5 rounded-full hover:bg-blue-50">
            Clear all
        </button>
    </div>

    <!-- Filter grid with improved spacing -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <!-- Agency Dropdown - Minimalist -->
        <div class="space-y-1.5">
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">
                Agency <span class="text-red-400 ml-0.5">*</span>
            </label>
            <div class="relative">
                <select [(ngModel)]="selectedAgency" (change)="onAgencySelect()"
                    class="w-full appearance-none bg-white border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 block px-3 py-2.5 transition-colors duration-200 hover:border-gray-300">
                    <option value="" class="text-gray-400">Select agency</option>
                    <option *ngFor="let agency of agencies" [value]="agency" class="text-gray-700">
                        {{ agency }}
                    </option>
                </select>
                <!-- Custom dropdown arrow -->
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                    <svg class="w-4 h-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                        <path
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                    </svg>
                </div>
            </div>
            <!-- Optional: Active indicator -->
            <div *ngIf="selectedAgency" class="text-[10px] text-green-600 flex items-center gap-1 mt-1">
                <span class="w-1 h-1 bg-green-500 rounded-full"></span>
                {{ selectedAgency }} selected
            </div>
        </div>

        <!-- Category Dropdown - Enhanced -->
        <div class="space-y-1.5">
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">
                Category
            </label>
            <div class="relative">
                <select [(ngModel)]="selectedCategory" (change)="onCategorySelect()" [disabled]="!selectedAgency"
                    class="w-full appearance-none bg-white border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 block px-3 py-2.5 transition-colors duration-200 disabled:bg-gray-50 disabled:text-gray-400 disabled:cursor-not-allowed">
                    <option value="" class="text-gray-500">All categories</option>
                    <option *ngFor="let category of categories" [value]="category" class="text-gray-700">
                        {{ category | titlecase }}
                    </option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-gray-400">
                    <svg class="w-4 h-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                        <path
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Route Select - Enhanced with loading state -->
        <div class="space-y-1.5">
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">
                Route
            </label>
            <div class="relative">
                <select [(ngModel)]="selectedRoute" (change)="onRouteSelect()" [disabled]="!selectedAgency || loading"
                    class="w-full appearance-none bg-white border border-gray-200 text-gray-700 text-sm rounded-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 block px-3 py-2.5 transition-colors duration-200 disabled:bg-gray-50 disabled:text-gray-400 disabled:cursor-not-allowed">
                    <option [ngValue]="null" class="text-gray-500">Select route</option>
                    <option *ngFor="let route of routes" [ngValue]="route" class="text-gray-700">
                        {{ route.route_short_name }} · {{ route.route_long_name | slice:0:25 }}
                    </option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3">
                    <!-- Loading spinner or dropdown arrow -->
                    <svg *ngIf="!loading; else spinner" class="w-4 h-4 fill-current text-gray-400"
                        xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                        <path
                            d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" />
                    </svg>
                    <ng-template #spinner>
                        <svg class="animate-spin h-4 w-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </ng-template>
                </div>
            </div>

            <!-- Route count badge -->
            <div *ngIf="routes.length > 0 && selectedAgency"
                class="text-[10px] text-gray-400 flex items-center gap-1 mt-1">
                <span>{{ routes.length }} routes available</span>
            </div>
        </div>

        <!-- Stop Search - Enhanced with modern input -->
        <div class="space-y-1.5">
            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider">
                Search stops
            </label>
            <div class="flex">
                <div class="relative flex-1">
                    <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="onSearchStop()"
                        [disabled]="!selectedAgency" placeholder="e.g., KL Sentral"
                        class="w-full border border-r-0 border-gray-200 text-gray-700 text-sm rounded-l-lg focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 block px-3 py-2.5 transition-colors duration-200 disabled:bg-gray-50 disabled:text-gray-400 placeholder:text-gray-400">
                    <div *ngIf="searchQuery" class="absolute inset-y-0 right-0 flex items-center pr-3">
                        <button (click)="searchQuery = ''" class="text-gray-400 hover:text-gray-600">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20">
                                <path
                                    d="M10 8.586L6.707 5.293a1 1 0 00-1.414 1.414L8.586 10l-3.293 3.293a1 1 0 101.414 1.414L10 11.414l3.293 3.293a1 1 0 001.414-1.414L11.414 10l3.293-3.293a1 1 0 00-1.414-1.414L10 8.586z" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button (click)="onSearchStop()" [disabled]="!selectedAgency || !searchQuery"
                    class="px-4 bg-blue-500 text-white rounded-r-lg hover:bg-blue-600 transition-colors duration-200 disabled:bg-gray-200 disabled:text-gray-400 flex items-center justify-center">
                    <svg class="w-4 h-4 fill-current" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                        <path fill-rule="evenodd"
                            d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
                            clip-rule="evenodd" />
                    </svg>
                </button>
            </div>

            <!-- Search hint -->
            <div *ngIf="selectedAgency && !searchQuery" class="text-[10px] text-gray-400 flex items-center gap-1 mt-1">
                <span>Type at least 2 characters</span>
            </div>
        </div>
    </div>

    <!-- Active filters summary (optional) -->
    <div *ngIf="selectedAgency || selectedCategory || selectedRoute || searchQuery"
        class="flex flex-wrap items-center gap-2 mt-4 pt-3 border-t border-gray-100">
        <span class="text-xs text-gray-400">Active filters:</span>

        <span *ngIf="selectedAgency"
            class="inline-flex items-center gap-1 px-2 py-1 bg-blue-50 text-blue-700 text-xs rounded-md">
            {{ selectedAgency }}
            <button (click)="selectedAgency = ''; onAgencySelect()" class="hover:text-blue-900">×</button>
        </span>

        <span *ngIf="selectedCategory"
            class="inline-flex items-center gap-1 px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded-md">
            {{ selectedCategory }}
            <button (click)="selectedCategory = ''; onCategorySelect()" class="hover:text-gray-900">×</button>
        </span>

        <span *ngIf="selectedRoute"
            class="inline-flex items-center gap-1 px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded-md">
            {{ selectedRoute.route_short_name }}
            <button (click)="selectedRoute = null; onRouteSelect()" class="hover:text-gray-900">×</button>
        </span>

        <span *ngIf="searchQuery"
            class="inline-flex items-center gap-1 px-2 py-1 bg-gray-100 text-gray-700 text-xs rounded-md">
            "{{ searchQuery }}"
            <button (click)="searchQuery = ''" class="hover:text-gray-900">×</button>
        </span>
    </div>
</div>
