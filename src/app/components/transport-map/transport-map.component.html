<div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="h-[600px] w-full relative" #mapContainer>
        <google-map [center]="center" [zoom]="zoom" [options]="options" (mapClick)="onMapClick()" height="100%"
            width="100%" (mapInitialized)="onMapInit($event)">

            <!-- Geofence Circle (50km radius) -->
            <map-circle *ngIf="center" [center]="center" [radius]="1000" [options]="geofenceOptions">
            </map-circle> <!-- Vehicle Markers (these will be clustered programmatically) -->
            <map-marker *ngFor="let marker of vehicleMarkers; trackBy: trackByMarkerId" #m="mapMarker"
                [position]="marker.position" [title]="marker.title" [options]="marker.options"
                (mapClick)="onMarkerClick(m, marker)"></map-marker>

            <!-- Stop Markers (these will be clustered programmatically) -->
            <map-marker *ngFor="let marker of stopMarkers; trackBy: trackByMarkerId" #m="mapMarker"
                [position]="marker.position" [title]="marker.title" [options]="marker.options"
                (mapClick)="onMarkerClick(m, marker)"></map-marker>

            <!-- User Location Marker (no clustering) -->
            <map-marker *ngIf="userMarker" #m="mapMarker" [position]="userMarker.position" [title]="userMarker.title"
                [options]="userMarker.options" (mapClick)="onMarkerClick(m, userMarker)"></map-marker>

            <!-- Info Window -->
            <map-info-window #infoWindow>
                <div [innerHTML]="selectedInfo"></div>
            </map-info-window>
        </google-map>

        <!-- Map Legend Overlay -->
        <div
            class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm rounded-xl shadow-lg p-4 text-sm z-10 border border-gray-100">
            <h4 class="text-xs font-medium text-gray-500 mb-3">Map Legend</h4>
            <div class="flex flex-col gap-2.5">
                <div class="flex items-center">
                    <div class="w-3 h-3 rounded-full mr-2" style="background: #4CAF50;"></div>
                    <span class="text-xs text-gray-700">Moving Vehicles</span>
                </div>
                <div class="flex items-center">
                    <div class="w-3 h-3 rounded-full mr-2" style="background: #FF9800;"></div>
                    <span class="text-xs text-gray-700">Stopped Vehicles</span>
                </div>
                <div class="flex items-center">
                    <div class="w-3 h-3 rounded-full mr-2" style="background: #F44336;"></div>
                    <span class="text-xs text-gray-700">Stops</span>
                </div>
                <div class="flex items-center">
                    <div class="w-3 h-3 rounded-full mr-2" style="background: #2196F3;"></div>
                    <span class="text-xs text-gray-700">Your Location</span>
                </div>
            </div>

            <!-- Geofence info -->
            <div class="mt-3 pt-3 border-t border-gray-100">
                <div class="flex items-center text-[10px] text-gray-500">
                    <span class="relative flex h-2 w-2 mr-2">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                    </span>
                    20km geofence radius
                </div>
            </div>
        </div>

        <!-- Cluster Info Badge -->
        <div *ngIf="vehicleMarkers.length > 0 || stopMarkers.length > 0"
            class="absolute top-4 right-4 bg-white/90 backdrop-blur-sm rounded-xl shadow-lg px-4 py-2 border border-gray-100 z-10">
            <div class="flex items-center gap-3 text-xs">
                <span class="flex items-center">
                    <span class="w-2 h-2 bg-green-500 rounded-full mr-1.5"></span>
                    {{ vehicleMarkers.length }} vehicles
                </span>
                <span class="w-px h-3 bg-gray-200"></span>
                <span class="flex items-center">
                    <span class="w-2 h-2 bg-red-500 rounded-full mr-1.5"></span>
                    {{ stopMarkers.length }} stops
                </span>
            </div>
        </div>
    </div>
</div>
